# Dataset Configuration for Leaf Image Autoencoder

# Data paths
data:
  # Base directory for processed images
  # Images should be in: {base_dir}/{environment}/{subdir}/cropped_{colorspace}_normalized[_masked]/
  base_dir: "data/generatable/images_processed"

  # Environment to use (e.g., 'test_output', 'aamu2025', 'fvsu2025', 'ne2025')
  environment: "ne2025"

  # Subdirectory within environment (leave empty if images are directly in cropped_* folders)
  subdir: ""

  # Field index CSV file path (should contain plotNumber to genotype mapping)
  # CSV must have columns: plotNumber, genotype (and any other field metadata)
  field_index_csv: "data/provided/field_image_metadata.csv"

  # Optional: Metadata CSV file path (additional metadata beyond genotype)
  # CSV should have columns: image_name and any other metadata
  # If not provided, only field index will be used
  metadata_csv: ""

# Image parameters
image:
  # Colorspace to use ('rgb', 'lab', 'hsv', etc.)
  # Must match the directory name convention: cropped_{colorspace}_normalized
  colorspace: "RGB"

  # Whether to use masked images (True/False)
  # If normalize_colorspace is True:
  #   - If use_masked is True: will look for cropped_{colorspace}_normalized_masked
  #   - If use_masked is False: will look for cropped_{colorspace}_normalized
  # If normalize_colorspace is False:
  #   - If use_masked is True: will look for cropped/ and apply mask from masks_cropped/
  #   - If use_masked is False: will look for cropped/
  use_masked: false

  # Whether images are color-normalized (True/False)
  # If True, uses cropped_{colorspace}_normalized[_masked] directories
  # If False, uses cropped/ directory (and masks_cropped/ if use_masked is True)
  normalize_colorspace: true

  # Target dimensions for resizing (height, width)
  # Images will be resized to this size
  target_size: [256, 256]

# Data splitting
split:
  # Split ratios (must sum to 1.0)
  # Splitting is done by genotype to prevent data leakage
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

  # Random seed for reproducible splits
  random_seed: 42

  # Column name in metadata CSV that contains genotype information
  genotype_column: "genotype"  # Will extract genotype from image name prefix

  # Whether to stratify splits (ensures balanced genotype distribution if possible)
  stratify: false

# DataLoader parameters
dataloader:
  # Batch size for training
  batch_size: 64

  # Number of worker processes for data loading
  num_workers: 4

  # Whether to shuffle training data
  shuffle_train: true

  # Whether to shuffle validation data
  shuffle_val: false

  # Whether to shuffle test data
  shuffle_test: false

  # Whether to drop last incomplete batch
  drop_last: false

  # Whether to pin memory for faster GPU transfer
  pin_memory: true

# Loss function configuration
loss:
  # Loss type: 'l1', 'disease_weighted_l1', or 'vae'
  type: 'l1'

  # For VAE loss: specify reconstruction loss type
  # Options: 'l1' or 'disease_weighted_l1'
  reconstruction_type: 'l1'

  # Disease-weighted loss parameter (alpha)
  # Controls strength of weighting for non-green pixels
  # Higher values = stronger penalty for disease symptoms
  # Typical range: 0.5 - 3.0
  disease_weight_alpha: 1.0

  # Beta parameter for VAE (beta-VAE framework)
  # Controls trade-off between reconstruction and latent space regularization
  # beta = 1.0: Standard VAE
  # beta > 1.0: Stronger regularization (more disentangled latents)
  # beta < 1.0: Emphasizes reconstruction quality
  beta: 1.0

# Model configuration
model:
  # Input image size [height, width]
  # Must match target_size in image configuration
  input_size: [256, 256]

  # Number of input channels (automatically set from image.colorspace)
  # RGB/LAB/HSV = 3 channels
  input_channels: 3

  # Bottleneck dimension (latent vector size)
  # Typical values: 128, 256, 512
  bottleneck_dim: 128

  # Attention mechanism configuration
  use_attention: false
  attention_type: "spatial"  # Options: "channel", "spatial", "both"

  # Whether the model is a VAE (variational autoencoder)
  # If true, model must output mu and logvar for latent distribution
  is_vae: false

  # Model architecture type (for future extensions)
  architecture: "pdse_lite"  # PDSE-Lite CAE architecture

# Training configuration
training:
  # Learning rate
  learning_rate: 0.001

  # Batch size (adjust based on available GPU memory)
  batch_size: 32

  # Number of epochs
  num_epochs: 500

  # Early stopping patience (stop if no improvement for N epochs)
  early_stopping_patience: 20

  # Optimizer settings
  optimizer: "adam"  # Options: "adam", "adamw", "sgd"
  weight_decay: 0.0
  momentum: 0.9  # For SGD optimizer

  # Learning rate scheduler (optional)
  use_scheduler: true
  scheduler_type: "plateau"  # Options: "plateau", "step", "cosine"
  scheduler_patience: 10  # For ReduceLROnPlateau
  scheduler_factor: 0.5  # LR reduction factor
  scheduler_step_size: 30  # For StepLR
  scheduler_gamma: 0.1  # For StepLR

  # Validation
  validation_frequency: 1  # Validate every N epochs

  # Checkpointing
  save_frequency: 20  # Save checkpoint every N epochs
  save_best_only: false  # If true, only save best model

  # Reproducibility
  random_seed: 42

# Additional settings
settings:
  # Whether to print verbose output during dataset creation
  verbose: true

  # Cache loaded images in memory (useful for small datasets)
  cache_images: true
